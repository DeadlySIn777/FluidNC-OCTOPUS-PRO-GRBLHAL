; ESP32 DevKit 38-pin Chatter Detection System
; Triple sensor fusion: MPU-6050 + INMP441 + ACS712
; Round 1.28" TFT Display: GC9A01 240x240

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    kosme/arduinoFFT@^2.0.2
    electroniccats/MPU6050@^1.3.0
    esp32async/AsyncTCP@^3.4.10
    esp32async/ESPAsyncWebServer@^3.9.4
    bblanchon/ArduinoJson@^6.21.5
    bodmer/TFT_eSPI@^2.5.43

lib_ignore =
    RPAsyncTCP
    ESPAsyncTCP

build_flags =
    -DCORE_DEBUG_LEVEL=1
    ; TFT_eSPI configuration for GC9A01 240x240 round display
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=5
    -DSPI_FREQUENCY=40000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
