; ═══════════════════════════════════════════════════════════════════════════
; PlatformIO Configuration - BTT Octopus Pro v1.1 (STM32F446)
; For use with grblHAL
; ═══════════════════════════════════════════════════════════════════════════
;
; USAGE:
; 1. Clone grblHAL: git clone --recurse-submodules https://github.com/grblHAL/STM32F4xx.git
; 2. Copy this file to grblHAL-STM32F4xx as "platformio.ini"
; 3. Build: pio run -e btt_octopus_pro_v11_f446
; 4. Flash via DFU: pio run -e btt_octopus_pro_v11_f446 -t upload
;
; ═══════════════════════════════════════════════════════════════════════════

[platformio]
include_dir = Inc
src_dir = Src
default_envs = btt_octopus_pro_v11_f446

[common]
build_flags =
  -I .
  -I boards
  -I FatFs
  -I FatFs/STM
  -I Drivers/FATFS/Target
  -I Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Inc
  -I Middlewares/ST/STM32_USB_Device_Library/Core/Inc
  -I USB_DEVICE/App
  -I USB_DEVICE/Target
  -D _USE_IOCTL=1
  -D _USE_WRITE=1
  -D _VOLUMES=1
  -Wl,-u,_printf_float
  -Wl,-u,_scanf_float
  -D OVERRIDE_MY_MACHINE

lib_deps =
  boards
  bluetooth
  grbl
  keypad
  laser
  motors
  trinamic
  odometer
  fans
  spindle
  embroidery
  Drivers/FATFS/App
  Drivers/FATFS/Target
  Middlewares/ST/STM32_USB_Device_Library/Core
  Middlewares/ST/STM32_USB_Device_Library/Class
  USB_DEVICE/App
  USB_DEVICE/Target
  FatFs
  sdcard

lib_extra_dirs =
  .
  boards
  FatFs
  Middlewares/ST/STM32_USB_Device_Library
  USB_DEVICE

[env]
platform = ststm32
platform_packages = framework-stm32cubef4 @ ~1.26.2
framework = stm32cube
lib_archive = no
lib_ldf_mode = off

; ═══════════════════════════════════════════════════════════════════════════
; BTT Octopus Pro v1.1 - STM32F446ZET6 - TMC2209 UART
; Main configuration for most users
; ═══════════════════════════════════════════════════════════════════════════
[env:btt_octopus_pro_v11_f446]
board = genericSTM32F446ZE
board_build.mcu = stm32f446zet6
board_build.ldscript = STM32F446ZETX_FLASH.ld

build_flags = ${common.build_flags}
  ; --- Board Configuration ---
  -D BOARD_BTT_OCTOPUS_PRO=
  -D STM32F446xx
  -D HSE_VALUE=12000000
  
  ; --- USB Serial ---
  -D USB_SERIAL_CDC=1
  
  ; --- SD Card ---
  -D SDCARD_ENABLE=1
  
  ; --- EEPROM (32Kbit I2C) ---
  -D EEPROM_ENABLE=32
  
  ; --- Probe ---
  -D PROBE_ENABLE=1
  
  ; --- TMC2209 via UART ---
  -D TRINAMIC_ENABLE=2209
  -D TRINAMIC_UART_ENABLE=2
  
  ; --- Soft Limits ---
  -D DEFAULT_SOFT_LIMIT_ENABLE=1
  
  ; --- Homing ---
  -D DEFAULT_HOMING_ENABLE=1
  
  ; --- Spindle PWM ---
  -D SPINDLE0_ENABLE=11
  -D N_SPINDLE=1
  
  ; --- E-Stop ---
  -D ESTOP_ENABLE=1

lib_deps = ${common.lib_deps}
  eeprom

lib_extra_dirs = ${common.lib_extra_dirs}
upload_protocol = dfu

; ═══════════════════════════════════════════════════════════════════════════
; BTT Octopus Pro v1.1 - STM32F446 - Standalone Mode (No UART)
; Use if TMC drivers are in standalone mode (no UART communication)
; ═══════════════════════════════════════════════════════════════════════════
[env:btt_octopus_pro_v11_f446_standalone]
board = genericSTM32F446ZE
board_build.mcu = stm32f446zet6
board_build.ldscript = STM32F446ZETX_FLASH.ld

build_flags = ${common.build_flags}
  -D BOARD_BTT_OCTOPUS_PRO=
  -D STM32F446xx
  -D HSE_VALUE=12000000
  -D USB_SERIAL_CDC=1
  -D SDCARD_ENABLE=1
  -D EEPROM_ENABLE=32
  -D PROBE_ENABLE=1
  -D TRINAMIC_ENABLE=0
  -D DEFAULT_SOFT_LIMIT_ENABLE=1
  -D DEFAULT_HOMING_ENABLE=1
  -D SPINDLE0_ENABLE=11
  -D N_SPINDLE=1
  -D ESTOP_ENABLE=1

lib_deps = ${common.lib_deps}
  eeprom

lib_extra_dirs = ${common.lib_extra_dirs}
upload_protocol = dfu

; ═══════════════════════════════════════════════════════════════════════════
; BTT Octopus Pro v1.1 - STM32F446 - TMC5160 SPI
; For high-power TMC5160 drivers
; ═══════════════════════════════════════════════════════════════════════════
[env:btt_octopus_pro_v11_f446_tmc5160]
board = genericSTM32F446ZE
board_build.mcu = stm32f446zet6
board_build.ldscript = STM32F446ZETX_FLASH.ld

build_flags = ${common.build_flags}
  -D BOARD_BTT_OCTOPUS_PRO=
  -D STM32F446xx
  -D HSE_VALUE=12000000
  -D USB_SERIAL_CDC=1
  -D SDCARD_ENABLE=1
  -D EEPROM_ENABLE=32
  -D PROBE_ENABLE=1
  -D TRINAMIC_ENABLE=5160
  -D TRINAMIC_SPI_ENABLE=1
  -D DEFAULT_SOFT_LIMIT_ENABLE=1
  -D DEFAULT_HOMING_ENABLE=1
  -D SPINDLE0_ENABLE=11
  -D N_SPINDLE=1
  -D ESTOP_ENABLE=1

lib_deps = ${common.lib_deps}
  eeprom

lib_extra_dirs = ${common.lib_extra_dirs}
upload_protocol = dfu
